<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サーバー障害のお知らせ</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      max-width: 500px;
      padding: 32px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 16px;
    }

    p {
      color: #cbd5e1;
      line-height: 1.7;
    }

    .small {
      margin-top: 24px;
      font-size: 0.9rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>サーバー障害が発生しています</h1>

    <p>
      現在、サーバー障害により全てのサービスをご利用いただけません。<br>
      復旧までいましばらくお待ちください。<br>
      <small>私にもいつ復旧するか分からないので...</small>
    </p>

    <div class="small">
      Error: サーバー停止中
    </div>
  </div>
</body>
</html>
